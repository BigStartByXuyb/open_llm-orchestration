# Alembic configuration file for LLM Orchestration Platform.
# The sqlalchemy.url is overridden by env.py via ORCH_DATABASE_URL.
# The value below is a placeholder only.

[alembic]
script_location = alembic
prepend_sys_path = .

# Migration file name template
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# SQLAlchemy URL - overridden in env.py from ORCH_DATABASE_URL
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/llm_orchestration

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
